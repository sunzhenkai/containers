# Redis 配置文件

# 网络配置
bind 0.0.0.0
protected-mode no
port 6379

# 通用配置
daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile ""

# 持久化配置
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
